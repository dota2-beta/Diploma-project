spring.application.name=news-system
spring.datasource.url=jdbc:postgresql://localhost:5432/news_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=postgresql
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
management.prometheus.metrics.export.enabled=true
# ?????????? ???????????
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5, 0.75, 0.95, 0.99, 0.999
# ?????? ??? ??????????
management.metrics.distribution.sla.http.server.requests=100ms, 500ms, 1s, 2s, 5s, 10s
# ??????? ????????? ????? ?????????
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=5
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=3
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=80
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
# ?????? ??????????? ?????????? ????????? ? ???? ??????????
resilience4j.circuitbreaker.instances.ml-service.base-config=default
# ????????? ????????? ?????????? ????????? ??????????????? ? ????????
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=prometheus,health,info