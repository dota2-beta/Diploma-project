global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'
    basic_auth:
      username: 'admin'
      password: 'admin123'
    static_configs:
      - targets: ['backend:8080']

  - job_name: 'ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml-service:5000']